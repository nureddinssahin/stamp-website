<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAMP</title>

<style>
:root {
  --bg: #000;
  --text: #f5f5f7;
  --muted: #a1a1aa;
  --accent: #38bdf8;
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #000;
  color: var(--text);
  scroll-behavior: smooth;
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  backdrop-filter: blur(16px);
  background: rgba(0,0,0,0.6);
  padding: 16px 40px;
}

/* HERO */
.hero {
  padding: 80px 40px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
}

.hero h1 {
  font-size: 64px;
  margin: 0;
}

.hero p {
  color: var(--muted);
  margin-top: 20px;
  max-width: 500px;
}

.btn {
  margin-top: 30px;
  padding: 16px 28px;
  border-radius: 999px;
  background: linear-gradient(135deg, #c7ecff, var(--accent));
  border: none;
  font-weight: bold;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  opacity: 0;
  transition: 0.4s;
}

.btn:hover::after {
  opacity: 1;
}

/* PHONE */
.hero-visual {
  position: relative;
}

.phone {
  position: absolute;
  border-radius: 40px;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  transition: 0.6s cubic-bezier(0.22,1,0.36,1);
}

.phone img {
  width: 100%;
}

.phone-front {
  width: 320px;
  right: 0;
  transform: rotate(6deg);
}

.phone-back {
  width: 260px;
  left: 0;
  top: 80px;
  transform: rotate(-10deg);
  opacity: 0.6;
  filter: blur(1px);
}

/* REVEAL */
.reveal {
  opacity: 0;
  transform: translateY(40px) scale(0.98);
  transition: 0.8s cubic-bezier(0.22,1,0.36,1);
}

.reveal.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* SECTIONS */
.section {
  padding: 120px 40px;
}

.feature {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: 1fr 1.2fr 1fr;
  gap: 20px;
}

.gallery img {
  width: 100%;
  border-radius: 20px;
  transition: 0.5s;
}

.gallery img:hover {
  transform: translateY(-10px) scale(1.02);
}

/* RESPONSIVE */
@media(max-width:900px){
  .hero, .feature {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header class="nav">STAMP</header>

<section class="hero">
  <div class="reveal">
    <h1>You were there too.</h1>
    <p>Find people who lived the same nights and share your concert story.</p>
    <button class="btn">Download</button>
  </div>

  <div class="hero-visual">
    <div class="phone phone-back">
      <img src="images/profile.png">
    </div>
    <div class="phone phone-front">
      <img src="images/match.png">
    </div>
  </div>
</section>

<section class="section feature reveal">
  <div>
    <h2>Log every concert</h2>
    <p>Save every detail beautifully.</p>
  </div>
  <img src="images/log.png">
</section>

<section class="section feature reveal">
  <img src="images/stamp.png">
  <div>
    <h2>Relive the night</h2>
    <p>Bring back the exact moment.</p>
  </div>
</section>

<section class="section feature reveal">
  <div>
    <h2>Your year in music</h2>
    <p>A story about your taste.</p>
  </div>
  <img src="images/wrapped.png">
</section>

<section class="section reveal">
  <div class="gallery">
    <img src="images/feed.png">
    <img src="images/match.png">
    <img src="images/profile.png">
  </div>
</section>

<script>
/* SCROLL REVEAL */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("visible");
    }
  });
}, { threshold: 0.15 });

document.querySelectorAll(".reveal").forEach(el => observer.observe(el));

/* PARALLAX */
document.addEventListener("mousemove", e => {
  const x = (e.clientX / window.innerWidth - 0.5) * 20;
  const y = (e.clientY / window.innerHeight - 0.5) * 20;

  document.querySelector(".phone-front").style.transform =
    `rotate(6deg) translate(${x}px, ${y}px)`;

  document.querySelector(".phone-back").style.transform =
    `rotate(-10deg) translate(${x*0.5}px, ${y*0.5}px)`;
});
</script>

</body>
</html>
