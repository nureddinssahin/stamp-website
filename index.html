<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STAMP — Stamp your memories.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ─────────────────────────────
   COLOR SYSTEM
───────────────────────────── */

:root{

--black:#0A0A0A;
--surface:#171717;
--border:#262626;

--primary:#5B3DF5;
--accent:#22D3EE;
--highlight:#FFD166;

--text:#FFFFFF;
--muted:#A1A1AA;
--dim:#52525B;

--gradient-primary:linear-gradient(135deg,#8A6CFF,#5B3DF5);

}

/* RESET */

*,*::before,*::after{
box-sizing:border-box;
margin:0;
padding:0;
}

html{scroll-behavior:smooth;}

body{
background:var(--black);
color:var(--text);
font-family:'DM Sans',sans-serif;
font-weight:300;
overflow-x:hidden;
}

/* ─────────────────────────────
   NOISE TEXTURE
───────────────────────────── */

body::before{

content:'';
position:fixed;
inset:0;

background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");

pointer-events:none;
z-index:0;
opacity:.6;
}

/* ─────────────────────────────
   NAV
───────────────────────────── */

nav{

position:fixed;
top:0;
left:0;
right:0;

z-index:100;

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

background:linear-gradient(to bottom,rgba(10,10,10,.95),transparent);

}

.nav-logo{

font-family:'Bebas Neue',sans-serif;
font-size:28px;
letter-spacing:3px;
text-decoration:none;
color:var(--text);

}

.nav-links{

display:flex;
gap:32px;
list-style:none;

}

.nav-links a{

text-decoration:none;
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
color:var(--muted);

transition:.2s;

}

.nav-links a:hover{

color:var(--accent);
text-shadow:0 0 8px rgba(34,211,238,.4);

}

/* ─────────────────────────────
   HERO
───────────────────────────── */

.hero{

position:relative;
min-height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:flex-start;

padding:120px 40px 80px;

overflow:hidden;

}

.hero-bg{

position:absolute;
inset:0;

background:

radial-gradient(ellipse 60% 50% at 80% 50%,rgba(91,61,245,.12) 0%,transparent 70%),
radial-gradient(ellipse 40% 60% at 10% 80%,rgba(34,211,238,.08) 0%,transparent 60%);

pointer-events:none;

}

/* HERO TEXT */

.hero-tag{

font-size:11px;
letter-spacing:5px;
text-transform:uppercase;
color:var(--accent);
margin-bottom:20px;

opacity:0;
animation:fadeUp .8s .2s forwards;

}

.hero-title{

font-family:'Bebas Neue',sans-serif;
font-size:clamp(80px,15vw,180px);
letter-spacing:4px;
line-height:.9;

opacity:0;
animation:fadeUp .8s .4s forwards;

}

.hero-title span{
color:var(--primary);
}

.hero-sub{

font-size:clamp(16px,2.5vw,22px);
color:var(--muted);
font-style:italic;
margin-top:24px;

opacity:0;
animation:fadeUp .8s .6s forwards;

}

/* CTA */

.hero-cta{

display:flex;
gap:16px;
margin-top:48px;
flex-wrap:wrap;

opacity:0;
animation:fadeUp .8s .8s forwards;

}

/* BUTTONS */

.btn-primary{

display:inline-flex;
align-items:center;
gap:10px;

background:var(--gradient-primary);

color:#fff;

padding:16px 32px;

border-radius:100px;

font-size:14px;
font-weight:500;

letter-spacing:1px;
text-decoration:none;

transition:.25s;

}

.btn-primary:hover{

transform:translateY(-2px);
box-shadow:0 0 25px rgba(91,61,245,.45);

}

.btn-secondary{

display:inline-flex;
align-items:center;
gap:10px;

background:transparent;
color:var(--muted);

padding:16px 32px;

border-radius:100px;

border:1px solid var(--border);

font-size:14px;
letter-spacing:1px;

text-decoration:none;

transition:.2s;

}

.btn-secondary:hover{

border-color:var(--accent);
color:var(--text);

}

/* ─────────────────────────────
   TICKER
───────────────────────────── */

.ticker-wrap{

overflow:hidden;

border-top:1px solid var(--border);
border-bottom:1px solid var(--border);

padding:14px 0;

background:var(--surface);

}

.ticker{

display:flex;
white-space:nowrap;

animation:ticker 25s linear infinite;

}

.ticker-item{

display:inline-flex;
align-items:center;
gap:24px;

padding:0 32px;

font-size:12px;
letter-spacing:4px;
text-transform:uppercase;

color:var(--muted);

}

.ticker-dot{

width:4px;
height:4px;

border-radius:50%;
background:var(--accent);

}

/* ─────────────────────────────
   FEATURES
───────────────────────────── */

.section{

padding:120px 40px;

}

.section-label{

font-size:11px;
letter-spacing:5px;
text-transform:uppercase;

color:var(--accent);

margin-bottom:16px;

}

.section-title{

font-family:'Bebas Neue',sans-serif;

font-size:clamp(42px,6vw,72px);

letter-spacing:2px;

line-height:1;

margin-bottom:60px;

}

.features-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:2px;

background:var(--border);

border:1px solid var(--border);

}

.feature-card{

background:var(--surface);

padding:40px 32px;

transition:.3s;

}

.feature-card:hover{

background:#1c1c1c;

transform:translateY(-4px);

}

.feature-emoji{

font-size:36px;
margin-bottom:20px;

}

.feature-title{

font-size:18px;
font-weight:500;
margin-bottom:10px;

}

.feature-desc{

font-size:14px;
color:var(--muted);
line-height:1.8;

}

/* ─────────────────────────────
   PRO
───────────────────────────── */

.pro-section{

background:var(--surface);

border:1px solid var(--border);

border-radius:24px;

padding:80px;

margin:0 40px;

}

.pro-badge{

display:inline-flex;
gap:6px;

background:var(--highlight);
color:#000;

padding:4px 12px;

border-radius:100px;

font-size:11px;
font-weight:800;
letter-spacing:2px;
text-transform:uppercase;

margin-bottom:24px;

}

.pro-title{

font-family:'Bebas Neue',sans-serif;

font-size:clamp(42px,6vw,64px);

letter-spacing:2px;

margin-bottom:16px;

}

.pro-desc{

color:var(--muted);

max-width:500px;

line-height:1.8;

margin-bottom:64px;

}

.pro-price{

font-family:'Bebas Neue',sans-serif;

font-size:48px;

color:var(--highlight);

}

/* ─────────────────────────────
   CTA
───────────────────────────── */

.cta-section{

padding:160px 40px;
text-align:center;

}

/* ─────────────────────────────
   FOOTER
───────────────────────────── */

footer{

border-top:1px solid var(--border);

padding:40px;

display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;

gap:20px;

}

.footer-logo{

font-family:'Bebas Neue',sans-serif;
letter-spacing:3px;
font-size:18px;

}

.footer-links{

display:flex;
gap:24px;
list-style:none;

}

.footer-links a{

color:var(--dim);
text-decoration:none;
font-size:12px;

transition:.2s;

}

.footer-links a:hover{

color:var(--accent);

}

/* ─────────────────────────────
   ANIMATION
───────────────────────────── */

@keyframes fadeUp{

from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}

}

@keyframes ticker{

from{transform:translateX(0);}
to{transform:translateX(-50%);}

}

.reveal{
opacity:0;
transform:translateY(40px);
transition:.8s;
}

.reveal.visible{
opacity:1;
transform:translateY(0);
}

@media(max-width:768px){

.hero{padding:120px 24px 80px;}

.pro-section{padding:48px 24px;margin:0 24px;}

.nav-links{display:none;}

.section{padding:80px 24px;}

}

</style>
</head>

<body>

<nav>

<a href="#" class="nav-logo">STAMP</a>

<ul class="nav-links">

<li><a href="#features">Features</a></li>
<li><a href="#pro">Pro</a></li>
<li><a href="#">Privacy</a></li>

</ul>

</nav>

<section class="hero">

<div class="hero-bg"></div>

<p class="hero-tag">🎫 Your Digital Concert Diary</p>

<h1 class="hero-title">STAMP<span>.</span></h1>

<p class="hero-sub">Stamp your memories.</p>

<div class="hero-cta">

<div class="btn-primary">
Coming Soon to App Store
</div>

<a href="#features" class="btn-secondary">Explore Features ↓</a>

</div>

</section>

</body>
</html>
